# AiMate Docker Compose Configuration
#
# 数据持久化说明：
# ~/.nanobot/ 目录包含所有需要持久化的数据：
#   - config.json     : 配置文件（API密钥等）
#   - workspace/      : 工作空间（对话记录、记忆、笔记等）
#   - knowledge/      : 知识库索引
#   - cron/           : 定时任务数据
#   - whitelist.json  : Web UI 认证白名单
#
# 首次部署步骤：
#   1. mkdir -p ~/.nanobot
#   2. 创建配置文件 ~/.nanobot/config.json（参考 config.example.json）
#   3. docker compose up -d nanobot-gateway
#   4. 容器启动时会自动执行 onboard 初始化工作空间
#
# 配置文件说明：
#   - 配置文件模板见 config.example.json
#   - 所有配置项都通过 config.json 管理（推荐）
#   - 也可以通过环境变量配置（需使用 Pydantic 格式）：
#     NANOBOT_PROVIDERS__DEEPSEEK__API_KEY
#     NANOBOT_PROVIDERS__OPENAI__API_KEY
#     NANOBOT_WEB__PASSWORD
#     NANOBOT_PERSISTENCE__SECRET

x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ${NANOBOT_DIR}:/root/.nanobot
  restart: unless-stopped
  networks:
    - nanobot-network

services:
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    command: ["gateway"]
    ports:
      - "18790:18790"
      - "8080:8080"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nanobot-cli:
    container_name: nanobot-cli
    <<: *common-config
    profiles:
      - cli
    command: ["agent"]
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 512M

networks:
  nanobot-network:
    driver: bridge
