<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nanobot - 身份验证</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary-color: #3b82f6;
        --primary-hover: #2563eb;
        --bg-color: #f8fafc;
        --card-bg: #ffffff;
        --border-color: #e2e8f0;
        --text-color: #1e293b;
        --text-secondary: #64748b;
        --error-color: #ef4444;
        --success-color: #22c55e;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      .login-container {
        background: var(--card-bg);
        border-radius: 1rem;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        width: 100%;
        max-width: 400px;
        padding: 2.5rem;
      }

      .login-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .login-logo {
        font-size: 3rem;
        margin-bottom: 1rem;
      }

      .login-title {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--text-color);
        margin-bottom: 0.5rem;
      }

      .login-subtitle {
        color: var(--text-secondary);
        font-size: 0.875rem;
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--text-color);
        margin-bottom: 0.5rem;
      }

      .form-input {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 2px solid var(--border-color);
        border-radius: 0.5rem;
        font-size: 1rem;
        transition: all 0.2s;
        outline: none;
      }

      .form-input:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      }

      .form-input::placeholder {
        color: var(--text-secondary);
      }

      .btn {
        width: 100%;
        padding: 0.875rem 1.5rem;
        border: none;
        border-radius: 0.5rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-primary {
        background: var(--primary-color);
        color: white;
      }

      .btn-primary:hover:not(:disabled) {
        background: var(--primary-hover);
        transform: translateY(-1px);
      }

      .btn-primary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .error-message {
        background: rgba(239, 68, 68, 0.1);
        color: var(--error-color);
        padding: 0.75rem 1rem;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        margin-bottom: 1rem;
        display: none;
      }

      .error-message.show {
        display: block;
      }

      .loading-spinner {
        display: inline-block;
        width: 1rem;
        height: 1rem;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-right: 0.5rem;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .info-text {
        text-align: center;
        color: var(--text-secondary);
        font-size: 0.75rem;
        margin-top: 1.5rem;
        line-height: 1.6;
      }

      .fingerprint-icon {
        display: inline-block;
        margin-right: 0.25rem;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-header">
        <div class="login-logo">🤖</div>
        <h1 class="login-title">Nanobot</h1>
        <p class="login-subtitle">请输入访问密码以验证身份</p>
      </div>

      <div id="errorMessage" class="error-message"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="password">访问密码</label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="请输入访问密码"
            autocomplete="off"
            required
          />
        </div>
        <button type="submit" id="submitBtn" class="btn btn-primary">
          验证身份
        </button>
      </form>

      <p class="info-text">
        <span class="fingerprint-icon">🔐</span>
        首次验证成功后，您的设备将被自动记住<br />
        无需再次输入密码
      </p>
    </div>

    <script>
      (function () {
        const FINGERPRINT_KEY = "nanobot_device_id";

        async function generateFingerprint() {
          let stored = localStorage.getItem(FINGERPRINT_KEY);
          if (stored) {
            return stored;
          }

          const components = [];

          components.push(navigator.userAgent);
          components.push(navigator.language);
          components.push(screen.width + "x" + screen.height);
          components.push(screen.colorDepth);
          components.push(new Date().getTimezoneOffset());
          components.push(navigator.platform);
          components.push(navigator.hardwareConcurrency || "unknown");

          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");
          if (ctx) {
            ctx.textBaseline = "top";
            ctx.font = "14px 'Arial'";
            ctx.textBaseline = "alphabetic";
            ctx.fillStyle = "#f60";
            ctx.fillRect(125, 1, 62, 20);
            ctx.fillStyle = "#069";
            ctx.fillText("Nanobot FP", 2, 15);
            components.push(canvas.toDataURL());
          }

          const fingerprint = await hashString(components.join("|||"));
          localStorage.setItem(FINGERPRINT_KEY, fingerprint);
          return fingerprint;
        }

        async function hashString(str) {
          const encoder = new TextEncoder();
          const data = encoder.encode(str);
          const hashBuffer = await crypto.subtle.digest("SHA-256", data);
          const hashArray = Array.from(new Uint8Array(hashBuffer));
          return hashArray.map((b) => b.toString(16).padStart(2, "0")).join("");
        }

        function showError(message) {
          const errorEl = document.getElementById("errorMessage");
          errorEl.textContent = message;
          errorEl.classList.add("show");
        }

        function hideError() {
          const errorEl = document.getElementById("errorMessage");
          errorEl.classList.remove("show");
        }

        function setLoading(loading) {
          const btn = document.getElementById("submitBtn");
          const passwordInput = document.getElementById("password");
          if (loading) {
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span>验证中...';
            passwordInput.disabled = true;
          } else {
            btn.disabled = false;
            btn.innerHTML = "验证身份";
            passwordInput.disabled = false;
          }
        }

        async function checkExistingAuth(fingerprint) {
          try {
            const response = await fetch("/api/auth/verify", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ fingerprint }),
            });
            const data = await response.json();
            return data.valid;
          } catch (e) {
            return false;
          }
        }

        async function handleLogin(e) {
          e.preventDefault();
          hideError();

          const password = document.getElementById("password").value;
          if (!password.trim()) {
            showError("请输入访问密码");
            return;
          }

          setLoading(true);

          try {
            const fingerprint = await generateFingerprint();

            const response = await fetch("/api/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                password: password,
                fingerprint: fingerprint,
              }),
            });

            const data = await response.json();

            if (response.ok && data.success) {
              document.cookie = `nanobot_fp=${fingerprint}; path=/; max-age=31536000; SameSite=Lax`;
              window.location.href = "/";
            } else {
              showError(data.detail || "验证失败，请重试");
              setLoading(false);
            }
          } catch (error) {
            showError("网络错误，请稍后重试");
            setLoading(false);
          }
        }

        async function init() {
          try {
            const statusResponse = await fetch("/api/auth/status");
            const status = await statusResponse.json();

            if (!status.requires_auth) {
              window.location.href = "/";
              return;
            }

            const fingerprint = await generateFingerprint();
            const isValid = await checkExistingAuth(fingerprint);

            if (isValid) {
              window.location.href = "/";
              return;
            }
          } catch (e) {
            console.error("Auth check failed:", e);
          }

          document
            .getElementById("loginForm")
            .addEventListener("submit", handleLogin);
          document.getElementById("password").focus();
        }

        init();
      })();
    </script>
  </body>
</html>
