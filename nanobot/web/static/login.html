<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nanobot - 身份验证</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary-color: #3b82f6;
        --primary-hover: #2563eb;
        --bg-color: #f8fafc;
        --card-bg: #ffffff;
        --border-color: #e2e8f0;
        --text-color: #1e293b;
        --text-secondary: #64748b;
        --error-color: #ef4444;
        --success-color: #22c55e;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      .login-container {
        background: var(--card-bg);
        border-radius: 1rem;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        width: 100%;
        max-width: 400px;
        padding: 2.5rem;
      }

      .login-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .login-logo {
        font-size: 3rem;
        margin-bottom: 1rem;
      }

      .login-title {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--text-color);
        margin-bottom: 0.5rem;
      }

      .login-subtitle {
        color: var(--text-secondary);
        font-size: 0.875rem;
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--text-color);
        margin-bottom: 0.5rem;
      }

      .form-input {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 2px solid var(--border-color);
        border-radius: 0.5rem;
        font-size: 1rem;
        transition: all 0.2s;
        outline: none;
      }

      .form-input:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      }

      .form-input::placeholder {
        color: var(--text-secondary);
      }

      .btn {
        width: 100%;
        padding: 0.875rem 1.5rem;
        border: none;
        border-radius: 0.5rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-primary {
        background: var(--primary-color);
        color: white;
      }

      .btn-primary:hover:not(:disabled) {
        background: var(--primary-hover);
        transform: translateY(-1px);
      }

      .btn-primary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .error-message {
        background: rgba(239, 68, 68, 0.1);
        color: var(--error-color);
        padding: 0.75rem 1rem;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        margin-bottom: 1rem;
        display: none;
      }

      .error-message.show {
        display: block;
      }

      .loading-spinner {
        display: inline-block;
        width: 1rem;
        height: 1rem;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-right: 0.5rem;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .info-text {
        text-align: center;
        color: var(--text-secondary);
        font-size: 0.75rem;
        margin-top: 1.5rem;
        line-height: 1.6;
      }

      .fingerprint-icon {
        display: inline-block;
        margin-right: 0.25rem;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-header">
        <div class="login-logo">🤖</div>
        <h1 class="login-title">Nanobot</h1>
        <p class="login-subtitle">请输入访问密码以验证身份</p>
      </div>

      <div id="errorMessage" class="error-message"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="password">访问密码</label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="请输入访问密码"
            autocomplete="off"
            required
          />
        </div>
        <button type="submit" id="submitBtn" class="btn btn-primary">
          验证身份
        </button>
      </form>

      <p class="info-text">
        <span class="fingerprint-icon">🔐</span>
        首次验证成功后，您的设备将被自动记住<br />
        无需再次输入密码
      </p>
    </div>

    <script>
      (function () {
        const FINGERPRINT_KEY = "nanobot_device_id";

        async function generateFingerprint() {
          let stored = localStorage.getItem(FINGERPRINT_KEY);
          if (stored) {
            return stored;
          }

          const components = [];

          components.push(navigator.userAgent);
          components.push(navigator.language);
          components.push(screen.width + "x" + screen.height);
          components.push(screen.colorDepth);
          components.push(new Date().getTimezoneOffset());
          components.push(navigator.platform);
          components.push(navigator.hardwareConcurrency || "unknown");

          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");
          if (ctx) {
            ctx.textBaseline = "top";
            ctx.font = "14px 'Arial'";
            ctx.textBaseline = "alphabetic";
            ctx.fillStyle = "#f60";
            ctx.fillRect(125, 1, 62, 20);
            ctx.fillStyle = "#069";
            ctx.fillText("Nanobot FP", 2, 15);
            components.push(canvas.toDataURL());
          }

          const fingerprint = await hashString(components.join("|||"));
          localStorage.setItem(FINGERPRINT_KEY, fingerprint);
          return fingerprint;
        }

        async function hashString(str) {
          const encoder = new TextEncoder();
          const data = encoder.encode(str);
          let hashBuffer;
          if (crypto && crypto.subtle) {
            hashBuffer = await crypto.subtle.digest("SHA-256", data);
          } else {
            hashBuffer = _sha256Fallback(data);
          }
          const hashArray = Array.from(new Uint8Array(hashBuffer));
          return hashArray.map((b) => b.toString(16).padStart(2, "0")).join("");
        }

        function _sha256Fallback(data) {
          function safeAdd(x, y) {
            const lsw = (x & 0xffff) + (y & 0xffff);
            const msw = (x >> 16) + (y >> 16) + (lsw >> 16);
            return (msw << 16) | (lsw & 0xffff);
          }
          function S(X, n) { return (X >>> n) | (X << (32 - n)); }
          function R(X, n) { return (X >>> n); }
          function Ch(x, y, z) { return (x & y) ^ (~x & z); }
          function Maj(x, y, z) { return (x & y) ^ (x & z) ^ (y & z); }
          function Sigma0(x) { return S(x, 2) ^ S(x, 13) ^ S(x, 22); }
          function Sigma1(x) { return S(x, 6) ^ S(x, 11) ^ S(x, 25); }
          function Gamma0(x) { return S(x, 7) ^ S(x, 18) ^ R(x, 3); }
          function Gamma1(x) { return S(x, 17) ^ S(x, 19) ^ R(x, 10); }
          const K = [
            0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
            0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
            0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
            0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
            0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
            0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
            0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
            0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
          ];
          function coreSHA256(m, l) {
            const W = [];
            let a = 0x6a09E667, b = 0xBB67AE85, c = 0x3C6EF372, d = 0xA54FF53A;
            let e = 0x510E527F, f = 0x9B05688C, g = 0x1F83D9AB, h = 0x5BE0CD19;
            m.push(0x80);
            while (m.length % 64 !== 56) m.push(0);
            m = m.concat([0,0,0,0,0,0,0,0].map((_, i) => (l * 8) >>> (56 - i * 8) & 0xff));
            for (let i = 0; i < m.length; i += 64) {
              const olda = a, oldb = b, oldc = c, oldd = d, olde = e, oldf = f, oldg = g, oldh = h;
              for (let j = 0; j < 64; j++) {
                if (j < 16) W[j] = (m[i + j * 4] << 24) | (m[i + j * 4 + 1] << 16) | (m[i + j * 4 + 2] << 8) | m[i + j * 4 + 3];
                else W[j] = safeAdd(safeAdd(safeAdd(Gamma1(W[j-2]), W[j-7]), Gamma0(W[j-15])), W[j-16]);
                const T1 = safeAdd(safeAdd(safeAdd(safeAdd(h, Sigma1(e)), Ch(e, f, g)), K[j]), W[j]);
                const T2 = safeAdd(Sigma0(a), Maj(a, b, c));
                h = g; g = f; f = e; e = safeAdd(d, T1);
                d = c; c = b; b = a; a = safeAdd(T1, T2);
              }
              a = safeAdd(a, olda); b = safeAdd(b, oldb); c = safeAdd(c, oldc); d = safeAdd(d, oldd);
              e = safeAdd(e, olde); f = safeAdd(f, oldf); g = safeAdd(g, oldg); h = safeAdd(h, oldh);
            }
            return [a, b, c, d, e, f, g, h];
          }
          const bytes = Array.from(new Uint8Array(data));
          const hash = coreSHA256(bytes, bytes.length);
          const result = new Uint8Array(32);
          for (let i = 0; i < 8; i++) {
            result[i * 4] = (hash[i] >> 24) & 0xff;
            result[i * 4 + 1] = (hash[i] >> 16) & 0xff;
            result[i * 4 + 2] = (hash[i] >> 8) & 0xff;
            result[i * 4 + 3] = hash[i] & 0xff;
          }
          return result.buffer;
        }

        function showError(message) {
          const errorEl = document.getElementById("errorMessage");
          errorEl.textContent = message;
          errorEl.classList.add("show");
        }

        function hideError() {
          const errorEl = document.getElementById("errorMessage");
          errorEl.classList.remove("show");
        }

        function setLoading(loading) {
          const btn = document.getElementById("submitBtn");
          const passwordInput = document.getElementById("password");
          if (loading) {
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span>验证中...';
            passwordInput.disabled = true;
          } else {
            btn.disabled = false;
            btn.innerHTML = "验证身份";
            passwordInput.disabled = false;
          }
        }

        async function checkExistingAuth(fingerprint) {
          try {
            const response = await fetch("/api/auth/verify", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ fingerprint }),
            });
            const data = await response.json();
            return data.valid;
          } catch (e) {
            return false;
          }
        }

        async function handleLogin(e) {
          e.preventDefault();
          hideError();

          const password = document.getElementById("password").value;
          if (!password.trim()) {
            showError("请输入访问密码");
            return;
          }

          setLoading(true);

          try {
            const fingerprint = await generateFingerprint();

            const response = await fetch("/api/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                password: password,
                fingerprint: fingerprint,
              }),
            });

            const data = await response.json();

            if (response.ok && data.success) {
              document.cookie = `nanobot_fp=${fingerprint}; path=/; max-age=31536000; SameSite=Lax`;
              window.location.href = "/";
            } else {
              showError(data.detail || "验证失败，请重试");
              setLoading(false);
            }
          } catch (error) {
            showError("网络错误，请稍后重试");
            setLoading(false);
          }
        }

        async function init() {
          try {
            const statusResponse = await fetch("/api/auth/status");
            const status = await statusResponse.json();

            if (!status.requires_auth) {
              window.location.href = "/";
              return;
            }

            const fingerprint = await generateFingerprint();
            const isValid = await checkExistingAuth(fingerprint);

            if (isValid) {
              window.location.href = "/";
              return;
            }
          } catch (e) {
            console.error("Auth check failed:", e);
          }

          document
            .getElementById("loginForm")
            .addEventListener("submit", handleLogin);
          document.getElementById("password").focus();
        }

        init();
      })();
    </script>
  </body>
</html>
