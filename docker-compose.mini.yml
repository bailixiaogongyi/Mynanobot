# AiMate Mini Deployment - 2GB RAM Optimized
#
# 适用于 2GB 内存服务器，2 个 nanobot 实例共用 1 个 ollama 服务
#
# 内存分配:
#   - nanobot-user1: 512MB
#   - nanobot-user2: 512MB
#   - ollama: 512MB
#   - 系统预留: ~1GB
#   - 总计: ~2GB
#
# 端口分配:
#   - nanobot-user1: 8081 (Web UI), 18791 (API)
#   - nanobot-user2: 8082 (Web UI), 18792 (API)
#   - ollama: 11434 (Embedding API)
#
# 部署步骤:
#   1. 创建配置文件目录:
#      - Linux/Mac: ~/.nanobot-user1/config.json 和 ~/.nanobot-user2/config.json
#      - 参考 config.example.json 模板填入 API Key
#   2. docker compose -f docker-compose.mini.yml build nanobot-user1 nanobot-user2
#   3. docker compose -f docker-compose.mini.yml up -d
#   4. docker exec nanobot-ollama ollama pull nomic-embed-text  (首次手动拉取模型)
#   5. 访问 http://localhost:8081 和 http://localhost:8082

services:
  ollama:
    container_name: nanobot-ollama
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    expose:
      - "11434"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - nanobot-network

  nanobot-user1:
    container_name: nanobot-user1
    build:
      context: .
      dockerfile: Dockerfile
    image: nanobot-aimated:latest
    command: ["gateway"]
    ports:
      - "8081:8080"
      - "18791:18790"
    volumes:
      - ${NANOBOT_USER1_DIR}:/root/.nanobot
    depends_on:
      - ollama
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - nanobot-network

  nanobot-user2:
    container_name: nanobot-user2
    build:
      context: .
      dockerfile: Dockerfile
    image: nanobot-aimated:latest
    command: ["gateway"]
    ports:
      - "8082:8080"
      - "18792:18790"
    volumes:
      - ${NANOBOT_USER2_DIR}:/root/.nanobot
    depends_on:
      - ollama
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - nanobot-network

volumes:
  ollama-data:

networks:
  nanobot-network:
    driver: bridge
